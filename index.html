<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Challenge</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, Arial, sans-serif; background: #f0f4ff; color: #1e293b; padding: 32px 16px 64px; }
.page { max-width: 640px; margin: 0 auto; }

.header {
  background: linear-gradient(135deg, #1d4ed8, #4f46e5); color: #fff; border-radius: 18px;
  padding: 34px 36px; margin-bottom: 28px; box-shadow: 0 6px 24px rgba(30,64,175,.3); text-align: center;
}
.header h1 { font-size: 34px; font-weight: 900; letter-spacing: -.5px; }
.header p { font-size: 16px; opacity: .9; margin-top: 8px; }

.section-label { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: #94a3b8; margin: 6px 4px 12px; }

a.card {
  display: flex; align-items: center; gap: 16px; text-decoration: none; color: inherit;
  background: #fff; border-radius: 14px; padding: 20px 24px; margin-bottom: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08); border-left: 6px solid #4f46e5;
  transition: transform .15s, box-shadow .15s;
}
a.card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.12); }
a.card .emoji { font-size: 30px; }
a.card .text { flex: 1; }
a.card .title { font-size: 19px; font-weight: 800; }
a.card .desc { font-size: 14px; color: #64748b; margin-top: 2px; }
a.card .arrow { font-size: 22px; color: #c7d2fe; }

a.card.leaderboard { border-left-color: #f59e0b; background: linear-gradient(135deg, #fffbeb, #fff); }
a.card.week2 { border-left-color: #0891b2; }

.footnote { text-align: center; color: #94a3b8; font-size: 13px; margin-top: 22px; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>🧮 Math Challenge</h1>
    <p>Solve 3 problems each week · climb the leaderboard</p>
  </div>

  <div class="section-label">Standings</div>
  <a class="card leaderboard" href="weeks/grade4/leaderboard.html">
    <span class="emoji">🏆</span>
    <span class="text">
      <span class="title">Leaderboard</span>
      <span class="desc">See this week's and the overall rankings</span>
    </span>
    <span class="arrow">→</span>
  </a>

  <div class="section-label" style="margin-top:22px">This term's problems</div>

  <a class="card week1" href="weeks/grade4/week1/grade4_week1.html">
    <span class="emoji">1️⃣</span>
    <span class="text">
      <span class="title">Week 1</span>
      <span class="desc">Grade 4 · 3 problems</span>
    </span>
    <span class="arrow">→</span>
  </a>

  <a class="card week2" href="weeks/grade4/week2/grade4_week2.html">
    <span class="emoji">2️⃣</span>
    <span class="text">
      <span class="title">Week 2</span>
      <span class="desc">Grade 4 · 3 problems</span>
    </span>
    <span class="arrow">→</span>
  </a>

  <p class="footnote">New problems every week. Submit before Sunday night!</p>

</div>
</body>
</html>
